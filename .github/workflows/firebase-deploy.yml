name: Deploy to Firebase App Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/384299187764/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@infynialabs-prod.iam.gserviceaccount.com

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase App Hosting
        run: |
          firebase apphosting:rollouts:create studio \
            --project infynialabs-prod \
            --git-branch main \
            --force
